name: CI/CD Pipeline

on:
  # Trigger on pushes to main and pull requests targeting main
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Define reusable job templates or matrix strategies for better organization
jobs:
  # ==================================================================
  # 1. BUILD & TEST JOB (Runs on multiple Python versions)
  # ==================================================================
  test:
    name: Test with Python ${{ matrix[python-version] }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11'] # Testing multiple versions is modern standard

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix[python-version] }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix[python-version] }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Cache dependencies for faster runs
        if [ -f requirements.txt ]; then
            pip install -r requirements.txt
        fi
      # We are relying on the cache action below for efficiency, but this is the install step.

    # ✅ Performance Improvement: Caching Python dependencies
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Lint with flake8
      run: |
        echo "--- Running Flake8 Linting ---"
        # Combine linting checks into one clearer block
        flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run tests with coverage
      # Use pytest discovery to run tests and generate coverage report
      run: |
        pytest --cov=src --cov-report=xml --cov-report=term-missing
      # Note: Coverage.xml will be generated by pytest/pytest-cov plugin

    - name: Upload coverage to Codecov
      # Only run this step if we are on the main branch to avoid spamming reports on PRs if desired
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  # ==================================================================
  # 2. DEPLOYMENT JOB (Only runs on push to main)
  # ==================================================================
  deploy:
    needs: test # Must pass tests on all versions before deploying
    runs-on: ubuntu-latest
    # Only run deployment logic when code is pushed directly to main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment: production # Best practice: Use GitHub Environments for secrets/protection rules
    
    steps:
    - name: Checkout code for deployment
      uses: actions/checkout@v4

    - name: Determine Target Environment (Improved Placeholder)
      id: env
      run: |
        echo "Determining target environment for deployment..."
        # In a real scenario, replace this flaky logic with:
        # 1. Reading a state file stored in artifacts or a central service (e.g., Consul/S3)
        # 2. Or requiring a manual input step from a user/workflow dispatcher.
        
        # For demonstration, let's keep the concept but use a fixed value for consistency:
        echo "target=blue" >> $GITHUB_OUTPUT # Assume we always deploy to Blue for this simplified example
        echo "This placeholder should be replaced with state management."

    - name: Deploy to Target Environment (${{ steps.env.outputs.target }})
      # Simplified single deployment step based on the determined target
      run: |
        echo "✅ Starting deployment to ${{ steps.env.outputs.target }} environment..."
        # Simulate comprehensive deployment using secrets/context variables
        # e.g., aws s3 sync ./build s3://my-bucket/${{ steps.env.outputs.target }}/
        echo "Deployment to ${{ steps.env.outputs.target }} completed successfully."
      
